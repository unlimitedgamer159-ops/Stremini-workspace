<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stremini — Code Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js" onerror="window._hljsFailed=true"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f2;--surface:#fff;--surface2:#f2f0ec;
  --border:#e4e0d8;--border2:#ece9e2;
  --txt:#1a1814;--txt2:#6b6459;--muted:#9e9589;
  --amber:#d97706;--amber-bg:#fffbf5;
  --cyan:#0369a1;--cyan-bg:#f0f9ff;--cyan-border:#bae6fd;
  --green:#059669;--green-bg:#d1fae5;--green-border:#6ee7b7;
  --violet:#7c3aed;--violet-bg:#f5f3ff;--violet-border:#ddd6fe;
  --orange:#ea580c;--orange-bg:#fff7ed;--orange-border:#fed7aa;
  --red:#991b1b;--red-bg:#fee2e2;--red-border:#fecaca;
  --red-full:#dc2626;--red-dark:#991b1b;
  --rose:#be123c;--rose-bg:#fff1f2;--rose-border:#fecdd3;
  --teal:#0d9488;--teal-bg:#f0fdfa;--teal-border:#99f6e4;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-border:#bfdbfe;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 14px rgba(0,0,0,.09),0 2px 6px rgba(0,0,0,.04);
  --r:10px;--r2:6px;
}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--txt);-webkit-font-smoothing:antialiased}
.layout{display:grid;grid-template-columns:290px 1fr;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sb-head{padding:24px 20px 18px;border-bottom:1px solid var(--border2)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.logo-icon{width:32px;height:32px;background:var(--txt);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:17px;height:17px}
.logo-name{font-family:'Lora',serif;font-size:17px;font-weight:600;letter-spacing:-.3px}
.logo-sub{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.sb-label{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mode-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 8px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--txt2);cursor:pointer;transition:all .15s;outline:none}
.mode-btn svg{width:18px;height:18px;flex-shrink:0}
.mode-btn:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-bg)}
.mode-btn.on-implement{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-bg)}
.mode-btn.on-review{border-color:var(--amber);color:var(--amber);background:var(--amber-bg)}
.mode-btn.on-debug{border-color:var(--orange);color:var(--orange);background:var(--orange-bg)}
.mode-btn.on-explain{border-color:var(--violet);color:var(--violet);background:var(--violet-bg)}
.mode-btn.on-security{border-color:var(--rose);color:var(--rose);background:var(--rose-bg)}
/* security btn spans full width when 5th in a 2-col grid */
.mode-btn.security-full{grid-column:1/-1}
.sb-sec{padding:16px 20px;border-bottom:1px solid var(--border2)}
.sb-sec:last-child{border-bottom:none}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-idle{background:var(--surface2);color:var(--muted)}
.badge-run{background:#fef3c7;color:#92400e}
.badge-done{background:var(--green-bg);color:#065f46}
.badge-err{background:var(--red-bg);color:var(--red)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge-run .dot{animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:2px}
.stat-box{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r2);padding:9px 6px;text-align:center}
.stat-n{font-family:'Lora',serif;font-size:19px;font-weight:500;line-height:1}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:3px}
.recent-list{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto}
.recent-item{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;background:var(--surface2);border-radius:var(--r2);font-size:12px;color:var(--txt2);cursor:pointer;transition:all .12s;line-height:1.4}
.recent-item:hover{background:var(--cyan-bg);color:var(--cyan)}
.ri-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);flex-shrink:0;margin-top:5px}
.muted-note{font-size:12px;color:var(--muted);font-style:italic}
.new-btn{display:flex;align-items:center;gap:7px;width:100%;padding:9px 11px;background:transparent;border:1.5px dashed var(--border);border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:12.5px;color:var(--txt2);cursor:pointer;transition:all .15s}
.new-btn:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-bg)}

/* ── Main ── */
.main{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg)}
.topbar{padding:13px 28px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tl{display:flex;align-items:center;gap:10px}
.mode-pill{display:flex;align-items:center;gap:6px;padding:4px 11px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:500;background:var(--surface);box-shadow:var(--shadow)}
.mode-pill.implement{color:var(--cyan);border-color:var(--cyan-border);background:var(--cyan-bg)}
.mode-pill.review{color:var(--amber);border-color:#fde68a;background:var(--amber-bg)}
.mode-pill.debug{color:var(--orange);border-color:var(--orange-border);background:var(--orange-bg)}
.mode-pill.explain{color:var(--violet);border-color:var(--violet-border);background:var(--violet-bg)}
.mode-pill.security{color:var(--rose);border-color:var(--rose-border);background:var(--rose-bg)}
.ghost-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:transparent;border:1.5px solid var(--border);border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;color:var(--txt2);cursor:pointer;transition:all .15s;outline:none}
.ghost-btn:hover{background:var(--surface);border-color:var(--muted)}

/* ── Messages ── */
.msgs-wrap{flex:1;overflow-y:auto;padding:28px 0;scroll-behavior:smooth}
.msgs{max-width:860px;margin:0 auto;padding:0 28px;display:flex;flex-direction:column}

/* ── Welcome ── */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;text-align:center;padding:20px 0}
.w-icon{width:62px;height:62px;background:var(--txt);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:var(--shadow-md)}
.w-icon svg{width:32px;height:32px}
.welcome h2{font-family:'Lora',serif;font-size:26px;font-weight:500;margin-bottom:8px;letter-spacing:-.4px}
.welcome p{font-size:14.5px;color:var(--txt2);line-height:1.65;max-width:460px;margin-bottom:26px}
.hint-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:580px}
.hint{display:flex;align-items:flex-start;gap:10px;padding:13px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);text-align:left;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.hint:hover{border-color:var(--cyan);background:var(--cyan-bg);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.hint.review-h:hover{border-color:var(--amber);background:var(--amber-bg)}
.hint.debug-h:hover{border-color:var(--orange);background:var(--orange-bg)}
.hint.explain-h:hover{border-color:var(--violet);background:var(--violet-bg)}
.hint.security-h:hover{border-color:var(--rose);background:var(--rose-bg)}
.hint-em{font-size:20px;flex-shrink:0;margin-top:1px}
.hint strong{display:block;font-size:12.5px;font-weight:500;margin-bottom:2px}
.hint small{font-size:11px;color:var(--muted)}

/* ── GitHub input panel ── */
.github-panel{display:none;flex-direction:column;gap:10px;padding:12px 16px;background:var(--rose-bg);border:1.5px solid var(--rose-border);border-radius:var(--r);margin-bottom:8px;animation:fadein .2s ease}
.github-panel.visible{display:flex}
.github-panel-title{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--rose);margin-bottom:2px}
.github-row{display:grid;grid-template-columns:1fr auto;gap:8px}
.gh-field{display:flex;flex-direction:column;gap:3px}
.gh-field label{font-size:10.5px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px}
.gh-input{padding:7px 10px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);font-family:'DM Mono','Courier New',monospace;font-size:12px;color:var(--txt);outline:none;transition:border-color .15s;width:100%}
.gh-input:focus{border-color:var(--rose)}
.gh-input::placeholder{color:var(--muted)}
.gh-hint{font-size:11px;color:var(--muted);margin-top:1px}
.gh-btn{border:none;background:var(--rose);color:#fff;padding:8px 12px;border-radius:var(--r2);font-size:12px;font-weight:600;cursor:pointer}
.gh-btn:disabled{opacity:.6;cursor:not-allowed}
.picker-panel{display:none;background:var(--surface);border:1px solid var(--rose-border);border-radius:var(--r2);padding:10px}
.picker-panel.visible{display:block}
.picker-toolbar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
.picker-meta{font-size:11px;color:var(--txt2)}
.picker-toolbar-right{display:flex;align-items:center;gap:6px}
.picker-actions{display:flex;gap:6px}
.picker-link{font-size:11px;border:1px solid var(--border);background:var(--surface2);padding:4px 8px;border-radius:4px;cursor:pointer}
.picker-toggle{font-size:11px;border:1px solid var(--rose-border);background:var(--rose-bg);color:var(--rose);padding:4px 8px;border-radius:4px;cursor:pointer;font-weight:600}
.picker-panel.minimized .picker-actions,.picker-panel.minimized .budget,.picker-panel.minimized #budgetMeta,.picker-panel.minimized .picker-list{display:none}
.picker-panel.minimized .picker-toolbar{margin-bottom:0}
.budget{height:7px;background:#f3f4f6;border-radius:99px;overflow:hidden;margin-bottom:8px;border:1px solid var(--border)}
.budget-bar{height:100%;width:0;background:var(--green);transition:width .2s ease,background .2s ease}
.picker-list{max-height:220px;overflow:auto;border:1px solid var(--border2);border-radius:6px;background:#fff}
.picker-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-bottom:1px solid var(--border2);font-size:12px}
.picker-row:last-child{border-bottom:none}
.picker-row code{font-family:'DM Mono','Courier New',monospace;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Message row ── */
.msg-row{display:flex;gap:12px;padding:18px 0;border-bottom:1px solid var(--border2);animation:fadein .3s ease}
.msg-row:last-child{border-bottom:none}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.av{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px}
.av-agent{background:var(--txt)}
.av-user{background:var(--cyan)}
.msg-body{flex:1;min-width:0}
.msg-who{font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:6px;display:flex;align-items:center;gap:7px}
.msg-time{font-weight:400;font-size:11px;color:var(--muted)}
.msg-content{font-size:14px;line-height:1.7;color:var(--txt)}
.msg-content p{margin:0}

/* ── Thinking ── */
.thinking-row{display:flex;gap:12px;padding:18px 0}
.dots{display:flex;gap:4px;align-items:center;height:22px}
.dots span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bonce 1.2s infinite}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes bonce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* ── Status cards ── */
.card{display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:var(--r);margin:4px 0;font-size:13px;font-weight:500}
.card-ok{background:var(--green-bg);color:#065f46;border:1px solid var(--green-border)}
.card-work{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.card-implement{background:var(--cyan-bg);color:#0c4a6e;border:1px solid var(--cyan-border)}
.card-review{background:var(--amber-bg);color:#92400e;border:1px solid #fde68a}
.card-debug{background:var(--orange-bg);color:#9a3412;border:1px solid var(--orange-border)}
.card-explain{background:var(--violet-bg);color:#5b21b6;border:1px solid var(--violet-border)}
.card-security{background:var(--rose-bg);color:var(--rose);border:1px solid var(--rose-border)}
.card-err{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}

/* ── Output block (implement/review/debug/explain) ── */
.out-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin:8px 0 4px;box-shadow:var(--shadow)}
.out-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--surface2)}
.out-hd-left{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600}
.out-hd-left.implement{color:var(--cyan)}
.out-hd-left.review{color:var(--amber)}
.out-hd-left.debug{color:var(--orange)}
.out-hd-left.explain{color:var(--violet)}
.copy-btn{background:none;border:1px solid var(--border);cursor:pointer;font-size:11px;color:var(--muted);font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;transition:all .15s}
.copy-btn:hover{background:var(--border);color:var(--txt)}
.copy-btn.copied{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.out-bd{padding:20px 24px;font-family:'DM Mono','Courier New',monospace;font-size:12.5px;line-height:1.85;color:var(--txt);max-height:640px;overflow-y:auto;background:#fafaf9}
.out-bd .text-line{display:block;white-space:pre-wrap;word-break:break-word;font-family:'DM Mono','Courier New',monospace;font-size:12.5px}
.out-bd .text-blank{display:block;height:.6em}
.out-bd .sec-div{display:block;border:none;border-top:1px solid var(--border2);margin:14px 0}
.out-bd .sec-head{display:block;font-family:'DM Sans',sans-serif;font-size:10.5px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 6px;padding-top:4px}
.out-bd pre{margin:10px 0;border-radius:var(--r2);overflow-x:auto;border:1px solid var(--border);background:#fff}
.out-bd pre code.hljs{font-family:'DM Mono','Courier New',monospace;font-size:12px;line-height:1.65;padding:14px 16px;background:#fff;display:block;border-radius:var(--r2)}
.dl-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;padding-bottom:2px}
.dl-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 15px;border:none;border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s}
.dl-txt{background:var(--txt);color:#fff}
.dl-txt:hover{background:#2d2a26;transform:translateY(-1px);box-shadow:var(--shadow-md)}
.dl-md{background:#0369a1;color:#fff}
.dl-md:hover{background:#075985;transform:translateY(-1px)}

/* ── File widgets ── */
.files-preamble{margin-bottom:10px;font-size:13.5px;color:var(--txt);line-height:1.7}
.files-preamble .text-line{display:block;white-space:pre-wrap;font-family:'DM Sans',sans-serif;font-size:13.5px}
.files-preamble .sec-head{display:block;font-size:10.5px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 4px}
.files-preamble .sec-div{display:block;border:none;border-top:1px solid var(--border2);margin:12px 0}
.file-widgets{display:flex;flex-direction:column;gap:8px;margin:6px 0 4px}
.file-widget{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);transition:border-color .15s}
.file-widget:hover{border-color:#c5c0b8}
.file-widget-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--surface2);cursor:pointer;user-select:none;border-bottom:1px solid transparent;transition:border-color .15s}
.file-widget.open .file-widget-hd{border-bottom-color:var(--border)}
.file-widget-hd:hover{background:#eceae5}
.fw-hd-left{display:flex;align-items:center;gap:9px}
.fw-file-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;letter-spacing:-.3px}
.fw-fi-dart{background:#e0f2fe;color:#0284c7}.fw-fi-yaml{background:#fef9c3;color:#a16207}.fw-fi-json{background:#dcfce7;color:#15803d}
.fw-fi-js{background:#fef3c7;color:#b45309}.fw-fi-ts{background:#dbeafe;color:#1d4ed8}.fw-fi-py{background:#ede9fe;color:#7c3aed}
.fw-fi-go{background:#d1fae5;color:#059669}.fw-fi-rb{background:#fee2e2;color:#b91c1c}.fw-fi-kt{background:#ede9fe;color:#7c3aed}
.fw-fi-swift{background:#fff7ed;color:#c2410c}.fw-fi-rs{background:#fef3c7;color:#d97706}.fw-fi-cpp{background:#dbeafe;color:#2563eb}
.fw-fi-cs{background:#ede9fe;color:#6d28d9}.fw-fi-html{background:#fee2e2;color:#dc2626}.fw-fi-css{background:#dbeafe;color:#1d4ed8}
.fw-fi-default{background:var(--surface2);color:var(--txt2)}
.fw-name-block{display:flex;flex-direction:column;gap:1px}
.fw-filename{font-family:'DM Mono','Courier New',monospace;font-size:12.5px;font-weight:500;color:var(--txt)}
.fw-filepath{font-size:11px;color:var(--muted)}
.fw-hd-right{display:flex;align-items:center;gap:8px}
.fw-lang-badge{padding:2px 8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:10.5px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.3px}
.fw-copy-btn{background:none;border:1px solid var(--border);cursor:pointer;font-size:11px;color:var(--muted);font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;transition:all .15s}
.fw-copy-btn:hover{background:var(--border);color:var(--txt)}
.fw-copy-btn.copied{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.fw-chevron{transition:transform .2s;color:var(--muted);flex-shrink:0}
.file-widget.open .fw-chevron{transform:rotate(180deg)}
.file-widget-body{display:none;padding:0}
.file-widget.open .file-widget-body{display:block}
.file-widget-body pre{margin:0;border-radius:0;border:none;background:#fafaf9}
.file-widget-body pre code.hljs{font-family:'DM Mono','Courier New',monospace;font-size:12px;line-height:1.65;padding:16px 18px;background:#fafaf9;display:block;border-radius:0}
.fw-lines-badge{font-size:10.5px;color:var(--muted);font-family:'DM Mono',monospace}
.files-summary{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px 14px;background:var(--cyan-bg);border:1px solid var(--cyan-border);border-radius:var(--r2);font-size:12.5px;color:#0c4a6e}
.files-summary svg{flex-shrink:0}
.fs-count{font-weight:600}
.fs-actions{display:flex;gap:6px;margin-left:auto}
.fs-action-btn{background:none;border:1px solid var(--cyan-border);cursor:pointer;font-size:11px;color:#0369a1;font-family:'DM Sans',sans-serif;padding:3px 9px;border-radius:4px;transition:all .15s}
.fs-action-btn:hover{background:#e0f2fe}

/* ══════════════════════════════════════════
   SECURITY REPORT STYLES (mirrored from Data.html)
   ══════════════════════════════════════════ */
.report-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin:8px 0 6px;box-shadow:var(--shadow)}

.report-summary{padding:13px 18px;background:#fafaf8;border-bottom:1px solid var(--border2);font-size:13px;line-height:1.65;color:var(--txt2);font-style:italic}

.r-section{border-bottom:1px solid var(--border2)}

.milestone-deadline{background:var(--surface);border:1px solid var(--border);color:var(--txt2);padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:500}

.milestone-row{display:flex;gap:9px;font-size:12.5px;line-height:1.45}
.milestone-row-label{font-weight:600;color:var(--txt2);min-width:120px;flex-shrink:0}

/* ── Input bar ── */
.input-bar{padding:16px 28px 20px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0}
.input-inner{max-width:860px;margin:0 auto}
.input-wrap{display:flex;align-items:flex-end;gap:9px;background:var(--surface);border:1.5px solid var(--border);border-radius:13px;padding:9px 11px;box-shadow:var(--shadow);transition:border-color .15s,box-shadow .15s}
.input-wrap:focus-within{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(3,105,161,.1),var(--shadow)}

.task-ta{flex:1;border:none;background:transparent;padding:3px;font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;min-height:22px;max-height:200px;resize:none;overflow-y:auto;outline:none;color:var(--txt)}
.task-ta::placeholder{color:var(--muted)}
.send-btn{width:34px;height:34px;background:var(--txt);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}

@media(max-width:720px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .hint-grid{grid-template-columns:1fr}
  .github-row{grid-template-columns:1fr}
}
</style>
</head>

  <!-- ── SIDEBAR ── -->

<script>
// ─────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────
const BACKEND = "https://scalability-code-agent.vishwajeetadkine705.workers.dev";
const GH_CONTEXT_LIMIT = 120000;
const SOURCE_FILE_RE = /\.(js|jsx|ts|tsx|mjs|cjs|py|go|rs|java|kt|swift|rb|php|cs|cpp|cc|c|h|hpp|scala|sh|sql|yaml|yml|json|toml|ini|md)$/i;

// ─────────────────────────────────────────
// State
// ─────────────────────────────────────────
let currentMode = "implement";
let running     = false;
let chatHistory = [];
let implCount = 0, reviewCount = 0, debugCount = 0;
let outputStore = {};
let ghPickerState = { owner:"", repo:"", files:[], selected:new Set(), cache:new Map(), usedChars:0 };

// ─────────────────────────────────────────
// DOM refs
// ─────────────────────────────────────────
const ta          = document.getElementById("ta");
const sendBtn     = document.getElementById("sendBtn");
const msgsEl      = document.getElementById("msgs");
const msgsWrap    = document.getElementById("msgsWrap");
const githubPanel = document.getElementById("githubPanel");
const inputWrap   = document.getElementById("inputWrap");
const ghRepoUrl   = document.getElementById("ghRepoUrl");
const ghFetchBtn  = document.getElementById("ghFetchBtn");
const pickerPanel = document.getElementById("pickerPanel");
const pickerList  = document.getElementById("pickerList");
const pickerMeta  = document.getElementById("pickerMeta");
const budgetBar   = document.getElementById("budgetBar");
const budgetMeta  = document.getElementById("budgetMeta");
const selectAllBtn= document.getElementById("selectAllBtn");
const analyseBtn  = document.getElementById("analyseBtn");
const pickerToggleBtn = document.getElementById("pickerToggleBtn");

// ─────────────────────────────────────────
// Textarea
// ─────────────────────────────────────────
ta.addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 200) + "px";
});
ta.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

function parseGitHubRepoInput(input) {
  const cleaned = input.trim().replace(/^https?:\/\/github\.com\//i, "").replace(/\.git$/i, "").replace(/^\/+|\/+$/g, "");
  const parts = cleaned.split("/").filter(Boolean);
  if (parts.length < 2) return null;
  return { owner: parts[0], repo: parts[1] };
}
function shouldExcludePath(path) {
  return /(^|\/)node_modules\//.test(path) || /(^|\/)dist\//.test(path) || /(^|\/)\.git\//.test(path);
}
function shouldIncludePath(path) {
  if (shouldExcludePath(path)) return false;
  return SOURCE_FILE_RE.test(path);
}

function setPickerMinimized(minimized) {
  pickerPanel.classList.toggle("minimized", minimized);
  pickerToggleBtn.textContent = minimized ? "Expand" : "Minimize";
}
function updateBudgetUI() {
  const pct = Math.min(100, (ghPickerState.usedChars / GH_CONTEXT_LIMIT) * 100);
  budgetBar.style.width = pct + "%";
  budgetBar.style.background = pct >= 90 ? "var(--red-full)" : pct >= 70 ? "var(--amber)" : "var(--green)";
  budgetMeta.textContent = `${ghPickerState.usedChars.toLocaleString()} / ${GH_CONTEXT_LIMIT.toLocaleString()} chars`;
}
function decodeGitHubContent(data) {
  if (!data || !data.content) return "";
  const normalized = String(data.content).replace(/\n/g, "");
  if ((data.encoding || "base64").toLowerCase() === "base64") {
    return decodeURIComponent(escape(atob(normalized)));
  }
  return String(data.content);
}
async function getFileContent(path) {
  if (ghPickerState.cache.has(path)) return ghPickerState.cache.get(path);
  const safePath = path.split("/").map(encodeURIComponent).join("/");
  const url = `https://api.github.com/repos/${ghPickerState.owner}/${ghPickerState.repo}/contents/${safePath}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Failed to load ${path}`);
  const data = await res.json();
  const text = decodeGitHubContent(data);
  ghPickerState.cache.set(path, text);
  return text;
}
async function toggleFile(path, checked) {
  const box = pickerList.querySelector(`input[data-path="${CSS.escape(path)}"]`);
  try {
    const content = await getFileContent(path);
    const size = content.length;
    if (checked) {
      if (ghPickerState.usedChars + size > GH_CONTEXT_LIMIT) {
        if (box) box.checked = false;
        return;
      }
      ghPickerState.selected.add(path);
      ghPickerState.usedChars += size;
    } else if (ghPickerState.selected.has(path)) {
      ghPickerState.selected.delete(path);
      ghPickerState.usedChars = Math.max(0, ghPickerState.usedChars - size);
    }
    updateBudgetUI();
  } catch (e) {

async function walkRepoContents(owner, repo, dir = "") {
  const safeDir = dir ? `/${dir.split("/").map(encodeURIComponent).join("/")}` : "";
  const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents${safeDir}`);
  if (!res.ok) throw new Error("GitHub contents fetch failed");
  const entries = await res.json();
  const arr = Array.isArray(entries) ? entries : [entries];
  const out = [];
  for (const entry of arr) {
    if (entry.type === "dir" && !shouldExcludePath(`${entry.path}/`)) {
      out.push(...await walkRepoContents(owner, repo, entry.path));
    } else if (entry.type === "file" && shouldIncludePath(entry.path)) {
      out.push(entry.path);
    }
  }
  return out;
}
async function fetchRepoFiles() {
  const parsed = parseGitHubRepoInput(ghRepoUrl.value);
  if (!parsed) return;
  ghFetchBtn.disabled = true;
  ghFetchBtn.textContent = "Fetching...";
  pickerPanel.classList.remove("visible");
  try {
    let files = [];
    const branchRes = await fetch(`https://api.github.com/repos/${parsed.owner}/${parsed.repo}`);
    if (!branchRes.ok) throw new Error("Unable to resolve repository metadata");
    const repoData = await branchRes.json();
    const branch = encodeURIComponent(repoData.default_branch || "HEAD");
    const treeRes = await fetch(`https://api.github.com/repos/${parsed.owner}/${parsed.repo}/git/trees/${branch}?recursive=1`);
    if (treeRes.ok) {
      const data = await treeRes.json();
      files = (data.tree || []).filter(i => i.type === "blob" && shouldIncludePath(i.path)).map(i => i.path);
      if (data.truncated || !files.length) {
        files = await walkRepoContents(parsed.owner, parsed.repo);
      }
    } else {
      files = await walkRepoContents(parsed.owner, parsed.repo);
    }
    files.sort((a, b) => a.localeCompare(b));
    ghPickerState = { owner: parsed.owner, repo: parsed.repo, files, selected:new Set(), cache:new Map(), usedChars:0 };
    pickerMeta.textContent = `${files.length} source files found in ${parsed.owner}/${parsed.repo}`;
    pickerPanel.classList.add("visible");
    renderPickerList();
    updateBudgetUI();
    setPickerMinimized(true);
  } catch (e) {
    pickerMeta.textContent = "Unable to fetch repository files.";
  } finally {
    ghFetchBtn.disabled = false;
    ghFetchBtn.textContent = "Fetch";
  }
}

function parseSegments(text) {
  const segments = [];
  const re = /```([a-zA-Z0-9]*)\n?([\s\S]*?)```/g;
  let lastIndex = 0, match;
  while ((match = re.exec(text)) !== null) {
    if (match.index > lastIndex) segments.push({ type:"text", content:text.slice(lastIndex, match.index) });
    segments.push({ type:"code", lang:match[1]||"", content:match[2] });
    lastIndex = re.lastIndex;
  }
  if (lastIndex < text.length) segments.push({ type:"text", content:text.slice(lastIndex) });
  return segments;
}

}

  }
  if (fileStarts.length < 2) return null;
  const preamble = lines.slice(0, fileStarts[0].lineIndex).join("\n").trim();
  const files = fileStarts.map((start, i) => {

    const fm = bodyText.match(/^```([a-zA-Z0-9]*)\n?([\s\S]*?)```/);
    const lang = fm ? (fm[1]||langFromFilename(start.filepath)) : langFromFilename(start.filepath);

  chevron.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>`;
  hdRight.appendChild(lb); hdRight.appendChild(langBadge); hdRight.appendChild(copyBtn); hdRight.appendChild(chevron);
  hd.appendChild(hdLeft); hd.appendChild(hdRight);
  const body = document.createElement("div"); body.className = "file-widget-body";
  const pre = document.createElement("pre"); const codeEl = document.createElement("code");
  if (file.lang) codeEl.className = "language-" + file.lang;
  codeEl.textContent = file.code; pre.appendChild(codeEl);
  try { hljs.highlightElement(codeEl); } catch(e) {}
  body.appendChild(pre); widget.appendChild(hd); widget.appendChild(body);
  hd.addEventListener("click", () => widget.classList.toggle("open"));
  if (index < 3) widget.classList.add("open");
  return widget;
}

function buildOutputBlock(rawContent, resultMode) {
  const uid = "out_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7);
  outputStore[uid] = rawContent;
  const modeLabel = { implement:"Implementation", review:"Code Review", debug:"Debug Analysis", explain:"Explanation" }[resultMode]||"Output";
  const modeIconMap = {
    implement:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
    review:   `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
    debug:    `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    explain:  `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`,
  };
  const wrap = document.createElement("div");

  // Multi-file for implement
  if (resultMode === "implement") {
    const parsed = parseFileBlocks(rawContent);
    if (parsed && parsed.files.length >= 2) {
      if (parsed.preamble) {
        const pre = document.createElement("div"); pre.className = "files-preamble";
        parseSegments(parsed.preamble).forEach(seg => {
          if (seg.type === "text") pre.appendChild(renderTextSegment(seg.content));

      }
      const summary = document.createElement("div"); summary.className = "files-summary";
      summary.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><span><span class="fs-count">${parsed.files.length} files</span> generated</span><div class="fs-actions"><button class="fs-action-btn" id="expandAll_${uid}">Expand all</button><button class="fs-action-btn" id="collapseAll_${uid}">Collapse all</button></div>`;
      wrap.appendChild(summary);
      const wc = document.createElement("div"); wc.className = "file-widgets"; wc.id = "widgets_"+uid;
      parsed.files.forEach((f,i) => wc.appendChild(buildFileWidget(f,i)));
      wrap.appendChild(wc);
      requestAnimationFrame(() => {
        const ea = document.getElementById("expandAll_"+uid);
        const ca = document.getElementById("collapseAll_"+uid);
        const ct = document.getElementById("widgets_"+uid);
        if (ea&&ct) ea.addEventListener("click",()=>ct.querySelectorAll(".file-widget").forEach(w=>w.classList.add("open")));
        if (ca&&ct) ca.addEventListener("click",()=>ct.querySelectorAll(".file-widget").forEach(w=>w.classList.remove("open")));
      });
      const dlRow = document.createElement("div"); dlRow.className = "dl-row";
      const dlTxt = document.createElement("button"); dlTxt.className = "dl-btn dl-txt";
      dlTxt.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download all (.txt)`;
      dlTxt.addEventListener("click",()=>{ const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([rawContent],{type:"text/plain"})); a.download=`stremini-implement-${Date.now()}.txt`; a.click(); URL.revokeObjectURL(a.href); });
      dlRow.appendChild(dlTxt); wrap.appendChild(dlRow);
      return wrap;
    }
  }

  // Single block
  const block = document.createElement("div"); block.className = "out-block";
  const hd = document.createElement("div"); hd.className = "out-hd";
  const hdLeft = document.createElement("div"); hdLeft.className = "out-hd-left " + resultMode;
  hdLeft.innerHTML = (modeIconMap[resultMode]||"") + " " + modeLabel;
  const copyBtn = document.createElement("button"); copyBtn.className = "copy-btn";
  copyBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy all`;
  copyBtn.addEventListener("click", ()=>copyText(outputStore[uid]||"", copyBtn));
  hd.appendChild(hdLeft); hd.appendChild(copyBtn); block.appendChild(hd);
  const bd = document.createElement("div"); bd.className = "out-bd";
  parseSegments(rawContent).forEach(seg => {
    if (seg.type==="text") bd.appendChild(renderTextSegment(seg.content));
    else bd.appendChild(renderCodeSegment(seg.lang, seg.content));
  });
  block.appendChild(bd); wrap.appendChild(block);
  const dlRow = document.createElement("div"); dlRow.className = "dl-row";
  const dlTxt = document.createElement("button"); dlTxt.className = "dl-btn dl-txt";
  dlTxt.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download .txt`;
  dlTxt.addEventListener("click",()=>{ const raw=outputStore[uid]||""; const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([raw],{type:"text/plain"})); a.download=`stremini-${resultMode}-${Date.now()}.txt`; a.click(); URL.revokeObjectURL(a.href); });
  const dlMd = document.createElement("button"); dlMd.className = "dl-btn dl-md";
  dlMd.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Download .md`;
  dlMd.addEventListener("click",()=>{ const raw=outputStore[uid]||""; const md=`# Stremini — ${modeLabel}\n\n${raw}`; const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([md],{type:"text/markdown"})); a.download=`stremini-${resultMode}-${Date.now()}.md`; a.click(); URL.revokeObjectURL(a.href); });
  dlRow.appendChild(dlTxt); dlRow.appendChild(dlMd); wrap.appendChild(dlRow);
  return wrap;
}

// ─────────────────────────────────────────
// Health badge (security report)
// ─────────────────────────────────────────
function healthBadgeHtml(score, label) {
  const n = parseInt(score)||0;
  let cls = "health-attention";
  if (n <= 40) cls = "health-critical";
  else if (n <= 60) cls = "health-risk";
  else if (n <= 75) cls = "health-attention";
  else if (n <= 89) cls = "health-healthy";
  else cls = "health-excellent";
  return `<div class="health-badge ${cls}"><span class="health-score-num">${n}</span>${escHtml(label||"")}</div>`;
}

function securityReportToText(data) {
  let t = (data.title||"Security Report") + " — Health: " + (data.health_score||"?") + "/100 " + (data.health_label||"") + "\n\n";
  if (data.summary) t += "SUMMARY\n" + data.summary + "\n\n";
  (data.sections||[]).forEach(sec => {
    const l = sec.label||"Section";
    t += l.toUpperCase() + "\n" + "─".repeat(l.length) + "\n";
    if (sec.content) t += sec.content + "\n\n";
    const arr = sec.insights||sec.flags||sec.benchmarks||sec.experiments||sec.milestones||sec.items||[];
    arr.forEach(item => {
      const name   = item.title||item.metric||item.name||item.target||item.label||"";
      const detail = item.detail||item.observation||item.consequence||item.hypothesis||item.value||"";
      if (name) t += "  • " + name + (detail?": "+detail:"") + "\n";
    });
    t += "\n";
  });
  return t;
}

function copySecurityReport(btn) {
  const block = btn.closest(".report-block");
  if (!block||!block.reportData) return;
  const text = securityReportToText(block.reportData);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "Copied!";
    setTimeout(()=>{ btn.innerHTML=`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy`; },1800);
  });
}

function downloadSecurityPdf(btn) {
  const block = btn.closest(".report-block");
  if (!block||!block.reportData) return;
  const text  = securityReportToText(block.reportData);
  const title = escHtml(block.reportData.title||"Security & Scalability Report");
  const body  = escHtml(text);
  const w = window.open("","_blank","width=960,height=760");
  if (!w) return;
  w.document.open();
  w.document.write(`<!doctype html><html><head><meta charset="utf-8"/><title>${title}</title><style>body{font-family:Arial,sans-serif;padding:32px;color:#1a1814;line-height:1.6}h1{font-size:22px;margin-bottom:16px}pre{white-space:pre-wrap;word-break:break-word;font-family:Arial,sans-serif;font-size:13px}@media print{body{padding:18px}}</style></head><body><h1>${title}</h1><pre>${body}</pre></body></html>`);
  w.document.close();
  w.onload = () => { w.focus(); setTimeout(()=>w.print(),120); };
}

function renderParsedSecurityText(rawText) {
  const lines = rawText.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const secScore = Number((rawText.match(/security\s*score\s*[:\-]?\s*(\d{1,3})/i)||[])[1] || 0);
  const scaScore = Number((rawText.match(/scalability\s*score\s*[:\-]?\s*(\d{1,3})/i)||[])[1] || 0);
  const findings = [...rawText.matchAll(/(?:^|\n)(?:[-*]\s*)?(CRITICAL|HIGH|MEDIUM|LOW)\s*[:\-]\s*([^\n]+)/gi)].map(m => ({ sev:m[1].toUpperCase(), title:m[2].trim() }));
  const severityRank = { CRITICAL: 1, HIGH: 2, MEDIUM: 3, LOW: 4 };
  findings.sort((a, b) => severityRank[a.sev] - severityRank[b.sev]);

  const roadmap = [];
  const roadmapRe = /(Do Now|This Sprint|Next Sprint|Long-?Term)\s*[:\-]\s*([^\n]+)/gi;
  let rm;
  while ((rm = roadmapRe.exec(rawText))) {
    roadmap.push({
      name: rm[2].trim(),
      effort: /immediate|now/i.test(rm[1]) ? "low" : /next/i.test(rm[1]) ? "high" : "medium",
      timeline: rm[1].trim(),
      hypothesis: rm[2].trim(),
      metric: "Risk reduction and stability uplift",
    });
  }

  const thematic = [];
  const thematicNames = ["Authentication", "Authorization", "Crypto", "Input Validation", "Database", "Caching", "Concurrency", "Statelessness", "Rate Limiting", "Secrets"];
  thematicNames.forEach(name => {
    const rx = new RegExp(`${name}\\s*[:\\-]\\s*([^\\n]+)`, "i");
    const m = rawText.match(rx);
    if (m) thematic.push({ title: name, detail: m[1].trim(), signal: /good|strong|safe|ok|healthy/i.test(m[1]) ? "positive" : /weak|missing|risk|issue|fail/i.test(m[1]) ? "negative" : "neutral" });
  });

  const hasSignal = secScore || scaScore || findings.length || roadmap.length || thematic.length;
  if (!hasSignal) {
    const wrap = document.createElement("div");
    const pre = document.createElement("pre");
    pre.className = "out-bd";
    pre.textContent = rawText;
    wrap.appendChild(pre);
    return wrap;
  }

  const overall = secScore && scaScore ? Math.round((secScore + scaScore) / 2) : (secScore || scaScore || 0);
  const summary = lines.find(l => l.length > 40 && !/score/i.test(l)) || "Structured fallback generated from raw security analysis output.";
  const reportData = {
    title: "Security & Scalability Analysis",
    health_score: overall,
    health_label: overall >= 85 ? "Strong posture" : overall >= 70 ? "Needs hardening" : "High risk",
    summary,
    sections: [
      {
        label: "Score Banner",
        icon: "bar-chart",
        content: "Primary risk posture extracted from the model output.",
        items: [
          { label: "Security Score", value: secScore ? `${secScore}/100` : "N/A" },
          { label: "Scalability Score", value: scaScore ? `${scaScore}/100` : "N/A" },
          { label: "Overall", value: overall ? `${overall}/100` : "N/A" }
        ]
      },
      findings.length ? {
        label: "Vulnerability Findings",
        icon: "alert",
        content: "Prioritized by severity for immediate triage.",
        flags: findings.map(f => ({
          severity: f.sev.toLowerCase(),
          metric: f.title,
          observation: `Mapped severity: ${f.sev}`,
          consequence: "Review attack path and implement remediation in the nearest sprint."
        }))
      } : null,
      thematic.length ? {
        label: "Analysis Sections",
        icon: "shield",
        content: "Security and scalability domain breakdown.",
        insights: thematic
      } : null,
      roadmap.length ? {
        label: "Remediation Roadmap",
        icon: "trending",
        content: "Phased fixes grouped by urgency.",
        experiments: roadmap
      } : null,
    ].filter(Boolean)
  };

  return renderSecurityReport(reportData);
}

// ─────────────────────────────────────────
// Main send handler
// ─────────────────────────────────────────
async function handleSend() {
  const query = ta.value.trim();
  const m     = currentMode;
  const cfg   = modeConfig[m];

  const hasSelectedFiles = ghPickerState.selected.size > 0;

  if (m === "security") {
    if (!query && !hasSelectedFiles) {
      ghRepoUrl.style.borderColor = "var(--rose)";
      setTimeout(()=>{ ghRepoUrl.style.borderColor = ""; }, 1200);
      return;
    }
  } else {
    if (!query || running) return;
  }

  if (running) return;

  // Build user-visible label for the message
  let displayQuery = query;
  if (m === "security" && ghPickerState.owner && ghPickerState.repo) {
    displayQuery = (query ? query + "\n\n" : "") + `📦 Repo: ${ghPickerState.owner}/${ghPickerState.repo}` + (hasSelectedFiles ? `\n🧾 Selected files: ${ghPickerState.selected.size}` : "");
  }

  addUserMsg(displayQuery);
  addRecent(displayQuery.slice(0,120), m);
  chatHistory.push({ role:"user", content: displayQuery });

  ta.value = "";
  ta.style.height = "auto";
  running = true;
  sendBtn.disabled = true;
  setStatus("run", cfg.statusLabel);
  showThinking();

  // Build request body
  const requestBody = {
    query: m === "security" && hasSelectedFiles
      ? `${query}\n\n${Array.from(ghPickerState.selected).map(path => `=== FILE: ${path} ===\n${ghPickerState.cache.get(path) || ""}`).join("\n\n")}`.trim()
      : m === "explain"
      ? query + "\n\nFor explain mode, respond in this exact structure:\n1) Concept Overview (2-4 concise bullets)\n2) Step-by-Step Flow (numbered sequence)\n3) Annotated Code Walkthrough (short code blocks + plain explanation)\n4) Common Mistakes (bullets)\n5) Practical Checklist (actionable bullets)\nKeep sections short, technical, and easy to scan."
      : query,
    mode: m,
    history: chatHistory.slice(-10),
    iteration: 0,
  };

  let data;
  try {
    const res = await fetch(BACKEND, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(requestBody),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    data = await res.json();
  } catch (err) {
    hideThinking();
    const slot = addAgentRow();
    slot.innerHTML = makeCardHtml("err", "Network error: " + escHtml(err.message));
    setStatus("err", "Error");
    running = false;
    sendBtn.disabled = false;
    return;
  }

  hideThinking();

  // ── Security report ──
  if (data.status === "SECURITY_REPORT" && data.data) {
    const slot = addAgentRow();
    const secCount = (data.data.sections||[]).length;
    const score = data.data.health_score||0;
    slot.innerHTML = makeCardHtml("security", `Security &amp; Scalability report — ${secCount} sections · Score ${score}/100`);
    slot.appendChild(renderSecurityReport(data.data));
    chatHistory.push({ role:"assistant", content:`[Security report: ${data.data.title||""}]` });
    setStatus("done", "Audit Complete");

  } else if (m === "security") {
    const slot = addAgentRow();
    const raw = data.content || data.solution || data.message || JSON.stringify(data, null, 2);
    slot.innerHTML = makeCardHtml("security", "Security &amp; Scalability report");
    slot.appendChild(renderParsedSecurityText(raw));
    chatHistory.push({ role:"assistant", content:`[Security report text]` });
    setStatus("done", "Audit Complete");

  // ── Standard modes ──
  } else {
    const statusMap = { CODE:"implement", REVIEW:"review", DEBUG:"debug", EXPLANATION:"explain" };
    const resultMode = statusMap[data.status];

    if (resultMode) {
      const rawContent = data.content||"";
      const slot = addAgentRow();
      slot.innerHTML = makeCardHtml(resultMode, cfg.doneLabel);
      slot.appendChild(buildOutputBlock(rawContent, resultMode));
      if (resultMode === "implement") implCount++;
      else if (resultMode === "review") reviewCount++;
      else if (resultMode === "debug") debugCount++;
      updateStats();
      chatHistory.push({ role:"assistant", content:`[${resultMode} output delivered]` });
      setStatus("done", "Done");

    } else if (data.status === "COMPLETED") {
      const slot = addAgentRow();
      const p = document.createElement("p"); p.style.whiteSpace = "pre-wrap"; p.textContent = data.solution||"";
      slot.appendChild(p);
      chatHistory.push({ role:"assistant", content: data.solution||"" });
      setStatus("done", "Done");

    } else if (data.status === "ERROR") {
      const slot = addAgentRow();
      slot.innerHTML = makeCardHtml("err", escHtml(data.message||"Unknown error"));
      setStatus("err", "Error");

    } else {
      const slot = addAgentRow();
      slot.innerHTML = makeCardHtml("err", "Unexpected response from server.");
      setStatus("err", "Error");
    }
  }

  running = false;
  sendBtn.disabled = false;
}

// ─────────────────────────────────────────
// Clear
// ─────────────────────────────────────────
function clearChat() {
  while (msgsEl.firstChild) msgsEl.removeChild(msgsEl.firstChild);
  msgsEl.appendChild(buildWelcome());
  chatHistory = [];
  outputStore = {};
  implCount = reviewCount = debugCount = 0;
  updateStats();
  const rl = document.getElementById("recentList");
  if (rl) rl.innerHTML = `<div class="muted-note">No queries yet</div>`;
  setStatus("idle", "Ready");
  running = false;
  sendBtn.disabled = false;
  thinkingRow = null;
  ghRepoUrl.value = "";
  pickerList.innerHTML = "";
  pickerPanel.classList.remove("visible");
  ghPickerState = { owner:"", repo:"", files:[], selected:new Set(), cache:new Map(), usedChars:0 };
  updateBudgetUI();
}
</script>
